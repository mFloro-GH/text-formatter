<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Formatter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 1.75rem;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 1100px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .toolbar label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #374151;
      white-space: nowrap;
    }

    #format-select {
      flex: 1;
      min-width: 220px;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 0.9rem;
      color: #1a1a2e;
      background: #fff;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    #format-select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

    .toolbar-actions { display: flex; gap: 0.6rem; margin-left: auto; }

    button {
      padding: 0.5rem 1.1rem;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-primary {
      background: #6366f1;
      color: #fff;
      box-shadow: 0 2px 6px rgba(99,102,241,0.3);
    }

    .btn-primary:hover { background: #4f46e5; }

    .btn-ghost {
      background: transparent;
      color: #9ca3af;
      border: 1.5px solid #e5e7eb;
    }

    .btn-ghost:hover { color: #ef4444; border-color: #fca5a5; }

    /* Two-pane layout */
    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 1100px;
    }

    @media (max-width: 640px) { .panes { grid-template-columns: 1fr; } }

    .pane {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #f3f4f6;
    }

    .pane-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9ca3af;
    }

    .pane-meta {
      font-size: 0.75rem;
      color: #d1d5db;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 420px;
      padding: 1rem;
      border: none;
      outline: none;
      resize: vertical;
      font-family: "SFMono-Regular", "Consolas", "Liberation Mono", monospace;
      font-size: 0.875rem;
      line-height: 1.6;
      color: #1a1a2e;
      background: #fff;
    }

    #output-area {
      background: #fafafa;
      color: #374151;
    }

    .pane-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      border-top: 1px solid #f3f4f6;
      background: #fafafa;
    }

    .line-count {
      font-size: 0.75rem;
      color: #d1d5db;
    }

    .btn-copy {
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.3rem 0.75rem;
      background: transparent;
      color: #9ca3af;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
    }

    .btn-copy:hover { background: #f3f4f6; color: #374151; border-color: #d1d5db; }
    .btn-copy.copied { color: #10b981; border-color: #6ee7b7; }
  </style>
</head>
<body>

  <h1>Text Formatter</h1>
  <p class="subtitle">Paste a list, pick a format, convert.</p>

  <!-- Toolbar -->
  <div class="toolbar">
    <label for="format-select">Format</label>
    <select id="format-select">
      <option value="comma">Add comma to each line &nbsp;&nbsp; value,</option>
      <option value="single">Single quotes + comma &nbsp;&nbsp;&nbsp; 'value',</option>
      <option value="double">Double quotes + comma &nbsp;&nbsp; "value",</option>
      <option value="upper">Convert to UPPERCASE</option>
      <option value="lower">Convert to lowercase</option>
    </select>
    <div class="toolbar-actions">
      <button class="btn-primary" onclick="convert()">Convert</button>
      <button class="btn-ghost" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- Panes -->
  <div class="panes">
    <div class="pane">
      <div class="pane-header">
        <span class="pane-title">Input</span>
        <span class="pane-meta" id="input-meta"></span>
      </div>
      <textarea id="input-area" placeholder="Paste your list here, one item per line…" spellcheck="false"></textarea>
      <div class="pane-footer">
        <span class="line-count" id="input-lines"></span>
      </div>
    </div>

    <div class="pane">
      <div class="pane-header">
        <span class="pane-title">Output</span>
        <span class="pane-meta" id="output-meta"></span>
      </div>
      <textarea id="output-area" readonly placeholder="Output will appear here after converting…" spellcheck="false"></textarea>
      <div class="pane-footer">
        <span class="line-count" id="output-lines"></span>
        <button class="btn-copy" id="copy-btn" onclick="copyOutput()">Copy</button>
      </div>
    </div>
  </div>

  <script>
    const inputArea  = document.getElementById('input-area');
    const outputArea = document.getElementById('output-area');

    // ── Line counters ─────────────────────────────────────────────────
    function updateInputMeta() {
      const lines = inputArea.value ? inputArea.value.split('\n').length : 0;
      document.getElementById('input-lines').textContent = lines ? `${lines} line${lines !== 1 ? 's' : ''}` : '';
    }

    function updateOutputMeta() {
      const lines = outputArea.value ? outputArea.value.split('\n').length : 0;
      document.getElementById('output-lines').textContent = lines ? `${lines} line${lines !== 1 ? 's' : ''}` : '';
    }

    inputArea.addEventListener('input', updateInputMeta);

    // ── Convert ───────────────────────────────────────────────────────
    function convert() {
      const raw = inputArea.value;
      if (!raw.trim()) { outputArea.value = ''; updateOutputMeta(); return; }

      const format = document.getElementById('format-select').value;
      const lines  = raw.split('\n');

      const transformed = lines.map(line => {
        // Preserve blank lines as-is
        if (line.trim() === '') return line;
        switch (format) {
          case 'comma':  return line + ',';
          case 'single': return `'${line}',`;
          case 'double': return `"${line}",`;
          case 'upper':  return line.toUpperCase();
          case 'lower':  return line.toLowerCase();
          default:       return line;
        }
      });

      outputArea.value = transformed.join('\n');
      updateOutputMeta();

      // Reset copy button if it was showing "Copied"
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }

    // ── Copy output ───────────────────────────────────────────────────
    function copyOutput() {
      if (!outputArea.value) return;
      navigator.clipboard.writeText(outputArea.value).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    // ── Clear ─────────────────────────────────────────────────────────
    function clearAll() {
      inputArea.value  = '';
      outputArea.value = '';
      document.getElementById('input-lines').textContent  = '';
      document.getElementById('output-lines').textContent = '';
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
      inputArea.focus();
    }
  </script>
</body>
</html>
